version: 2
updates:
  # GitHub Actions — weekly, grouped into one PR.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # npm — monthly, patch-only. Major and minor bumps are deferred to a human:
  # ai v5 removed LanguageModelV1Middleware (breaks floe-guard's middleware),
  # and Next/React majors need a deliberate migration. Patch releases (incl.
  # security fixes within a major) still flow automatically.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
